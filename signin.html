</head>
<body>

<header class="site-header">
  <div class="nav-row">
    <a class="brand" href="index.html">
      <svg class="mark" viewBox="0 0 32 32" fill="none"><path d="M16 2L28 7V15C28 22.5 22.8 27.8 16 30C9.2 27.8 4 22.5 4 15V7L16 2Z" stroke="#F5A524" stroke-width="2"/><path d="M11 16L14.5 19.5L21.5 12" stroke="#F5A524" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      STACKLY<span class="tag">Security</span>

    <nav class="nav-links">
      <a href="index.html">Home</a>

      <a href="contact.html">Contact</a>
    </nav>
    <div class="nav-actions">
      <a class="btn btn-ghost" href="signin.html">Sign In</a>
      <a class="btn btn-solid" href="register.html">Register</a>
      <button class="menu-toggle" aria-label="Toggle menu"><svg width="18" height="14" viewBox="0 0 18 14" fill="none"><path d="M0 1H18M0 7H18M0 13H18" stroke="#E8ECF1" stroke-width="1.5"/></svg></button>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">
    <form class="auth-wrap" id="signinForm">
      <div class="eyebrow">Client Portal</div>
      <h1>Sign in</h1>
      <p class="sub">Access your case dashboard, reports, and live alerts.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@company.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-solid btn-block">Sign In</button>

      <div class="form-foot">Don't have an account? <a href="register.html">Register here</a></div>
    </form>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 STACKLY Security. All rights reserved.</span>
      <span>CASE-LOG / SYSTEM NOMINAL</span>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
